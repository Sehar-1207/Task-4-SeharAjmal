<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Onboarding & Management - CoreCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
        <i class="fas fa-arrow-left me-2 small opacity-75"></i> Back to Dashboard
      </a>
      <span class="navbar-text text-warning font-monospace small">Staff Management Node</span>
    </div>
  </nav>

  <div class="container-fluid my-5 px-md-5">
    <div class="row g-4">
      
      <div class="col-xl-4 col-lg-5">
        <div class="card p-4 clinical-card">
          <div class="d-flex align-items-center mb-2">
            <div class="bg-primary bg-opacity-10 icon-shape me-3" style="width: 42px; height: 42px;">
              <i class="fas fa-user-md text-primary fs-5"></i>
            </div>
            <div>
              <h2 class="h5 fw-bold text-dark mb-0">Onboard New Specialist</h2>
              <p class="text-xs text-muted mb-0 small" style="font-size: 0.8rem; margin-top: 2px;">Register credentialed healthcare professionals.</p>
            </div>
          </div>
          <hr class="my-4 opacity-25">

          <form id="doctor-form">
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted text-uppercase">Doctor Name</label>
              <input type="text" id="d-name" class="form-control shadow-none" placeholder="Dr. Sarah Jenkins" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted text-uppercase">Specialty Area</label>
              <input type="text" id="d-specialty" class="form-control shadow-none" placeholder="Cardiology" required>
            </div>

            <div class="mb-4">
              <label class="form-label small fw-semibold text-muted text-uppercase">Official Email Address</label>
              <input type="email" id="d-email" class="form-control shadow-none" placeholder="s.jenkins@corecare.com" required>
            </div>

            <button type="submit" id="d-submit-btn" class="btn btn-primary w-100 fw-medium shadow-sm btn-commit" style="background-color: var(--bs-primary) !important;">
              Onboard Clinician
            </button>
          </form>

          <div id="doctor-feedback" class="mt-3 d-none p-3 rounded text-xs font-medium border"></div>
        </div>
      </div>

      <div class="col-xl-8 col-lg-7">
        <div class="card p-4 clinical-card h-100">
          <div class="d-flex align-items-center mb-3">
            <div class="bg-secondary bg-opacity-10 icon-shape me-3" style="width: 40px; height: 40px;">
              <i class="fas fa-address-book text-secondary fs-5"></i>
            </div>
            <div>
              <h3 class="h5 fw-bold text-dark mb-0">Medical Staff Directory</h3>
              <p class="text-xs text-muted mb-0 small" style="font-size: 0.8rem; margin-top: 1px;">Manage active clinical practitioners records.</p>
            </div>
          </div>
          <hr class="opacity-25 mb-4">

          <div class="table-responsive scrollable-registry">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light text-uppercase fs-7" style="font-size: 0.75rem; letter-spacing: 0.05em;">
                <tr>
                  <th>Physician Information</th>
                  <th>Clinical Assignment</th>
                  <th class="text-end">Management Actions</th>
                </tr>
              </thead>
              <tbody id="doctors-list">
                <tr>
                  <td colspan="3" class="text-center py-4 text-muted">Querying staff registries...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="modal fade" id="updateDoctorModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow" style="border-radius: 14px;">
        <div class="modal-header bg-dark text-white border-0 py-3">
          <h5 class="modal-title h6 fw-bold"><i class="fas fa-user-edit text-warning me-2"></i>Modify Specialist File</h5>
          <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="update-doctor-form">
          <input type="hidden" id="edit-d-id">
          <div class="modal-body p-4">
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted text-uppercase">Doctor Name</label>
              <input type="text" id="edit-d-name" class="form-control shadow-none" required>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted text-uppercase">Specialty Area</label>
              <input type="text" id="edit-d-specialty" class="form-control shadow-none" required>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted text-uppercase">Official Email Address</label>
              <input type="email" id="edit-d-email" class="form-control shadow-none" required>
            </div>
            <div id="edit-d-feedback" class="mt-3 d-none alert"></div>
          </div>
          <div class="modal-footer border-top bg-light p-3" style="border-bottom-left-radius: 14px; border-bottom-right-radius: 14px;">
            <button type="button" class="btn btn-sm btn-secondary font-medium px-3" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" id="edit-d-submit" class="btn btn-sm btn-primary font-medium px-4 shadow-sm" style="background-color: var(--bs-primary) !important; border:none;">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
    <div id="toast-feedback" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body small fw-medium" id="toast-text"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/doctors.js"></script>
</body>
</html>
